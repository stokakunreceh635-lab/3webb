<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 3DXO Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:linear-gradient(145deg,#f0f4f8 0%,#e6edf4 100%); color:#1a2c3e; padding:1.5rem; }
        .container { max-width:1400px; margin:0 auto; }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .logo-letter {
            width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            border-radius: 0.8rem;
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .logo-letter:nth-child(2) { background: #f59e0b; color: #1e293b; }
        .logo-letter:nth-child(3) { background: #3b82f6; }
        .logo-letter:nth-child(4) { background: #f59e0b; color: #1e293b; }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            margin-left: 0.5rem;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .navbar {
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(10px);
            border-radius:2rem;
            padding:1rem 2rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:2rem;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }
        .nav-links { display:flex; gap:1.5rem; }
        .nav-links a { text-decoration:none; color:#334155; font-weight:600; transition:0.2s; cursor:pointer; }
        .nav-links a:hover { color:#3b82f6; }
        .card { background:white; border-radius:2rem; padding:1.8rem; margin-bottom:2rem; box-shadow:0 10px 25px -5px rgba(0,0,0,0.05); transition:0.3s; }
        .section-title { font-size:1.8rem; font-weight:700; margin-bottom:1.5rem; color:#1e293b; }
        .form-group { margin-bottom:1.2rem; }
        .form-group label { display:block; font-weight:600; margin-bottom:0.4rem; color:#334155; }
        .form-control { width:100%; padding:0.8rem 1rem; border:2px solid #e2e8f0; border-radius:1rem; font-size:1rem; transition:0.2s; }
        .form-control:focus { outline:none; border-color:#3b82f6; }
        .btn { padding:0.7rem 1.5rem; border-radius:2rem; font-weight:600; cursor:pointer; transition:0.2s; border:none; }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-primary:hover { background:#2563eb; transform:translateY(-2px); }
        .btn-outline { background:white; border:2px solid #3b82f6; color:#3b82f6; }
        .btn-outline:hover { background:#3b82f6; color:white; }
        .btn-danger { background:#ef4444; color:white; }
        .btn-success { background:#10b981; color:white; }
        .product-grid, .ad-grid, .banner-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.8rem; }
        .product-card, .ad-card, .banner-card { background:#f8fafc; border-radius:1.5rem; overflow:hidden; border:1px solid #e2e8f0; transition:0.2s; }
        .product-card:hover, .ad-card:hover, .banner-card:hover { transform:translateY(-5px); box-shadow:0 15px 30px -12px rgba(0,0,0,0.15); }
        .product-img, .ad-img, .banner-img { height:180px; background:#cbd5e1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .product-img img, .ad-img img, .banner-img img { width:100%; height:100%; object-fit:cover; }
        .product-info, .ad-info, .banner-info { padding:1.2rem; }
        .product-title { font-weight:700; font-size:1.2rem; }
        .product-price { color:#3b82f6; font-weight:800; margin:0.5rem 0; }
        .ad-title, .banner-title { font-weight:700; font-size:1.1rem; }
        .product-actions, .ad-actions, .banner-actions { display:flex; gap:0.8rem; justify-content:flex-end; }
        .image-preview { max-width: 150px; max-height: 150px; margin-top: 0.5rem; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .badge-active { background:#10b981; color:white; padding:0.2rem 0.6rem; border-radius:1rem; font-size:0.8rem; }
        .badge-inactive { background:#ef4444; color:white; padding:0.2rem 0.6rem; border-radius:1rem; font-size:0.8rem; }
        footer { text-align:center; margin-top:3rem; color:#64748b; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">
            <div class="logo-letter">3</div>
            <div class="logo-letter">D</div>
            <div class="logo-letter">X</div>
            <div class="logo-letter">O</div>
            <div class="logo-text">STORE</div>
        </div>
        <div class="nav-links">
            <a id="productsTab">Produk</a>
            <a id="ordersTab">Pesanan</a>
            <a id="invoicesTab">Tagihan</a>
            <a id="adsTab">Iklan Grid</a>
            <a id="bannersTab">Banner Slider</a>
            <a id="logoutBtn">Logout</a>
        </div>
    </div>

    <div id="loginForm" class="card" style="max-width:400px; margin:2rem auto; text-align:center;">
        <h2 class="section-title">Admin Login</h2>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="adminPassword" class="form-control" placeholder="Masukkan password admin">
        </div>
        <button class="btn btn-primary" id="adminLoginBtn">Login</button>
        <p style="margin-top:1rem;">Password: <strong>admin1</strong></p>
    </div>

    <div id="adminPanel" style="display:none;">
        <!-- Produk -->
        <div id="productsPanel">
            <div class="card">
                <h2 class="section-title">Tambah / Edit Produk</h2>
                <form id="productForm" enctype="multipart/form-data">
                    <input type="hidden" id="productId">
                    <div class="form-group"><label>Nama Layanan</label><input type="text" id="productName" class="form-control" required></div>
                    <div class="form-group"><label>Kategori</label><input type="text" id="productCategory" class="form-control" required></div>
                    <div class="form-group"><label>Harga (Rp)</label><input type="number" id="productPrice" class="form-control" required></div>
                    <div class="form-group"><label>Deskripsi</label><textarea id="productDesc" class="form-control" rows="3" required></textarea></div>
                    <div class="form-group"><label>Gambar Produk</label><input type="file" id="productImageFile" accept="image/*" class="form-control"><img id="productImagePreview" class="image-preview" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary">Simpan Produk</button>
                    <button type="button" id="cancelEdit" class="btn btn-outline">Batal</button>
                </form>
            </div>
            <div class="card"><h2 class="section-title">Daftar Produk</h2><div id="productList" class="product-grid"></div></div>
        </div>

        <!-- Pesanan -->
        <div id="ordersPanel" style="display:none;"><div class="card"><h2 class="section-title">Pesanan Masuk</h2><div id="orderList"></div></div></div>

        <!-- Tagihan -->
        <div id="invoicesPanel" style="display:none;">
            <div class="card"><h2 class="section-title">Buat Tagihan Baru</h2><form id="invoiceForm"><div class="form-group"><label>Email Pembeli</label><input type="email" id="invoiceEmail" class="form-control" required></div><div class="form-group"><label>Nama Pembeli (opsional)</label><input type="text" id="invoiceName" class="form-control"></div><div class="form-group"><label>Nominal (Rp)</label><input type="number" id="invoiceAmount" class="form-control" required></div><div class="form-group"><label>Deskripsi Tagihan</label><textarea id="invoiceDesc" class="form-control" rows="2" required></textarea></div><button type="submit" class="btn btn-primary">Buat Tagihan</button></form></div>
            <div class="card"><h2 class="section-title">Daftar Tagihan</h2><div id="invoiceList"></div></div>
        </div>

        <!-- Iklan Grid -->
        <div id="adsPanel" style="display:none;">
            <div class="card"><h2 class="section-title">Tambah Iklan Baru</h2><form id="adForm" enctype="multipart/form-data"><div class="form-group"><label>Judul Iklan</label><input type="text" id="adTitle" class="form-control" required></div><div class="form-group"><label>Gambar Iklan</label><input type="file" id="adImageFile" accept="image/*" class="form-control"><img id="adImagePreview" class="image-preview" style="display:none;"></div><div class="form-group"><label>URL Tautan</label><input type="url" id="adLink" class="form-control" placeholder="https://..." required></div><div class="form-group"><label>Status</label><select id="adActive" class="form-control"><option value="true">Aktif</option><option value="false">Tidak Aktif</option></select></div><button type="submit" class="btn btn-primary">Simpan Iklan</button></form></div>
            <div class="card"><h2 class="section-title">Daftar Iklan</h2><div id="adList" class="ad-grid"></div></div>
        </div>

        <!-- Banner Slider -->
        <div id="bannersPanel" style="display:none;">
            <div class="card">
                <h2 class="section-title">Tambah Banner Slider (16:9)</h2>
                <form id="bannerForm" enctype="multipart/form-data">
                    <div class="form-group"><label>Gambar Banner (16:9)</label><input type="file" id="bannerImageFile" accept="image/*" class="form-control"><img id="bannerImagePreview" class="image-preview" style="display:none;"></div>
                    <div class="form-group"><label>Link Tujuan (misal: /product/xxx atau https://...)</label><input type="url" id="bannerLink" class="form-control" placeholder="https://..." required></div>
                    <div class="form-group"><label>Status</label><select id="bannerActive" class="form-control"><option value="true">Aktif</option><option value="false">Tidak Aktif</option></select></div>
                    <button type="submit" class="btn btn-primary">Tambah Banner</button>
                </form>
            </div>
            <div class="card">
                <h2 class="section-title">Daftar Banner</h2>
                <div id="bannerList" class="banner-grid"></div>
            </div>
        </div>
    </div>
    <footer>© 2026 3DXO STORE - Admin Panel</footer>
</div>

<script>
    const STORAGE_KEYS = {
        PRODUCTS: '3dxo_products',
        ORDERS: '3dxo_orders',
        INVOICES: '3dxo_invoices',
        ADS: '3dxo_ads',
        BANNERS: '3dxo_banners'
    };
    let products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS)) || [];
    let orders = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS)) || [];
    let invoices = JSON.parse(localStorage.getItem(STORAGE_KEYS.INVOICES)) || [];
    let ads = JSON.parse(localStorage.getItem(STORAGE_KEYS.ADS)) || [];
    let banners = JSON.parse(localStorage.getItem(STORAGE_KEYS.BANNERS)) || [];

    function saveProducts() { localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); }
    function saveOrders() { localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders)); }
    function saveInvoices() { localStorage.setItem(STORAGE_KEYS.INVOICES, JSON.stringify(invoices)); }
    function saveAds() { localStorage.setItem(STORAGE_KEYS.ADS, JSON.stringify(ads)); }
    function saveBanners() { localStorage.setItem(STORAGE_KEYS.BANNERS, JSON.stringify(banners)); }

    // Demo data
    if (products.length === 0) {
        products = [
            { id: 'p1', name: 'Website Company Profile', category: 'Website', price: 1500000, desc: 'Website profesional untuk perusahaan Anda.', image: '' },
            { id: 'p2', name: 'Toko Online (E-commerce)', category: 'E-commerce', price: 3500000, desc: 'Toko online lengkap.', image: '' },
            { id: 'p3', name: 'Landing Page Modern', category: 'Landing Page', price: 800000, desc: 'Halaman promosi menarik.', image: '' }
        ];
        saveProducts();
    }
    if (ads.length === 0) {
        ads = [
            { id: 'ad1', title: 'Promo Spesial', imageUrl: '', link: 'https://example.com', active: true, createdAt: new Date().toISOString() },
            { id: 'ad2', title: 'Diskon 50%', imageUrl: '', link: 'https://example.com', active: true, createdAt: new Date().toISOString() }
        ];
        saveAds();
    }
    if (banners.length === 0) {
        banners = [
            { id: 'b1', imageUrl: '', link: 'https://example.com/product1', active: true, createdAt: new Date().toISOString() }
        ];
        saveBanners();
    }

    // DOM elements (singkat, karena sebagian besar sama)
    const loginFormDiv = document.getElementById('loginForm');
    const adminPanelDiv = document.getElementById('adminPanel');
    const productsPanelDiv = document.getElementById('productsPanel');
    const ordersPanelDiv = document.getElementById('ordersPanel');
    const invoicesPanelDiv = document.getElementById('invoicesPanel');
    const adsPanelDiv = document.getElementById('adsPanel');
    const bannersPanelDiv = document.getElementById('bannersPanel');
    const productListDiv = document.getElementById('productList');
    const orderListDiv = document.getElementById('orderList');
    const invoiceListDiv = document.getElementById('invoiceList');
    const adListDiv = document.getElementById('adList');
    const bannerListDiv = document.getElementById('bannerList');
    const productForm = document.getElementById('productForm');
    const invoiceForm = document.getElementById('invoiceForm');
    const adForm = document.getElementById('adForm');
    const bannerForm = document.getElementById('bannerForm');
    const productIdInput = document.getElementById('productId');
    const productNameInput = document.getElementById('productName');
    const productCategoryInput = document.getElementById('productCategory');
    const productPriceInput = document.getElementById('productPrice');
    const productDescInput = document.getElementById('productDesc');
    const productImageFile = document.getElementById('productImageFile');
    const productImagePreview = document.getElementById('productImagePreview');
    const adTitleInput = document.getElementById('adTitle');
    const adImageFile = document.getElementById('adImageFile');
    const adImagePreview = document.getElementById('adImagePreview');
    const adLinkInput = document.getElementById('adLink');
    const adActiveSelect = document.getElementById('adActive');
    const cancelEditBtn = document.getElementById('cancelEdit');
    const productsTab = document.getElementById('productsTab');
    const ordersTab = document.getElementById('ordersTab');
    const invoicesTab = document.getElementById('invoicesTab');
    const adsTab = document.getElementById('adsTab');
    const bannersTab = document.getElementById('bannersTab');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminLoginBtn = document.getElementById('adminLoginBtn');

    // Banner preview
    const bannerImageFile = document.getElementById('bannerImageFile');
    const bannerImagePreview = document.getElementById('bannerImagePreview');
    const bannerLinkInput = document.getElementById('bannerLink');
    const bannerActiveSelect = document.getElementById('bannerActive');

    bannerImageFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { bannerImagePreview.src = ev.target.result; bannerImagePreview.style.display = 'block'; };
            reader.readAsDataURL(file);
        } else {
            bannerImagePreview.style.display = 'none';
        }
    });

    // Product preview
    productImageFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { productImagePreview.src = ev.target.result; productImagePreview.style.display = 'block'; };
            reader.readAsDataURL(file);
        } else {
            productImagePreview.style.display = 'none';
        }
    });

    // Ad preview
    adImageFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { adImagePreview.src = ev.target.result; adImagePreview.style.display = 'block'; };
            reader.readAsDataURL(file);
        } else {
            adImagePreview.style.display = 'none';
        }
    });

    // Fungsi render (produk, pesanan, tagihan, iklan, banner)
    function showProducts() { productsPanelDiv.style.display='block'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='none'; bannersPanelDiv.style.display='none'; renderProducts(); }
    function showOrders() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='block'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='none'; bannersPanelDiv.style.display='none'; renderOrders(); }
    function showInvoices() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='block'; adsPanelDiv.style.display='none'; bannersPanelDiv.style.display='none'; renderInvoices(); }
    function showAds() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='block'; bannersPanelDiv.style.display='none'; renderAds(); }
    function showBanners() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='none'; bannersPanelDiv.style.display='block'; renderBanners(); }

    function renderProducts() {
        productListDiv.innerHTML = '';
        if (products.length === 0) { productListDiv.innerHTML = '<div class="card">Belum ada produk.</div>'; return; }
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img">${p.image ? `<img src="${p.image}">` : '<i class="fas fa-code fa-3x"></i>'}</div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                    <div class="product-desc">${p.desc.substring(0,80)}${p.desc.length>80?'...':''}</div>
                    <div class="product-actions">
                        <button class="btn btn-outline" onclick="editProduct('${p.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Hapus</button>
                    </div>
                </div>
            `;
            productListDiv.appendChild(card);
        });
    }

    window.editProduct = (id) => {
        const p = products.find(p => p.id === id);
        if (p) {
            productIdInput.value = p.id;
            productNameInput.value = p.name;
            productCategoryInput.value = p.category;
            productPriceInput.value = p.price;
            productDescInput.value = p.desc;
            if (p.image) { productImagePreview.src = p.image; productImagePreview.style.display = 'block'; }
            else productImagePreview.style.display = 'none';
            productImageFile.value = '';
            productForm.scrollIntoView({ behavior: 'smooth' });
        }
    };
    window.deleteProduct = (id) => {
        if (confirm('Hapus produk?')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProducts();
        }
    };

    productForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = productIdInput.value;
        const name = productNameInput.value.trim();
        const category = productCategoryInput.value.trim();
        const price = parseInt(productPriceInput.value);
        const desc = productDescInput.value.trim();
        const file = productImageFile.files[0];
        if (!name || !category || !price || !desc) return alert('Isi semua');
        const process = (img) => {
            if (id) {
                const idx = products.findIndex(p => p.id === id);
                if (idx !== -1) products[idx] = { ...products[idx], name, category, price, desc, image: img || products[idx].image };
            } else {
                products.push({ id: 'p'+Date.now(), name, category, price, desc, image: img || '' });
            }
            saveProducts();
            renderProducts();
            productForm.reset();
            productIdInput.value = '';
            productImagePreview.style.display = 'none';
        };
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => process(ev.target.result);
            reader.readAsDataURL(file);
        } else {
            process(null);
        }
    });
    cancelEditBtn.addEventListener('click', () => {
        productForm.reset();
        productIdInput.value = '';
        productImagePreview.style.display = 'none';
    });

    function renderOrders() {
        orderListDiv.innerHTML = '';
        if (orders.length === 0) { orderListDiv.innerHTML = '<div class="card">Belum ada pesanan.</div>'; return; }
        orders.forEach(order => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div><strong>ID:</strong> ${order.id}</div>
                <div><strong>Pembeli:</strong> ${order.customerName} (${order.customerEmail})</div>
                <div><strong>Total:</strong> Rp ${order.total.toLocaleString()}</div>
                <div><strong>Status:</strong> ${order.status}</div>
                <div><strong>Tanggal:</strong> ${new Date(order.date).toLocaleString()}</div>
                <hr><h4>Detail:</h4>${order.items.map(i => `<div>${i.name} x ${i.quantity} = Rp ${(i.price*i.quantity).toLocaleString()}</div>`).join('')}
            `;
            orderListDiv.appendChild(card);
        });
    }

    function renderInvoices() {
        invoiceListDiv.innerHTML = '';
        if (invoices.length === 0) { invoiceListDiv.innerHTML = '<div class="card">Belum ada tagihan.</div>'; return; }
        invoices.forEach(inv => {
            const div = document.createElement('div');
            div.className = 'invoice-item';
            div.innerHTML = `
                <div><strong>${inv.email}</strong> - ${inv.name || '-'}</div>
                <div>Rp ${inv.amount.toLocaleString()} - ${inv.desc}</div>
                <div>Status: ${inv.paid ? 'Lunas' : 'Belum Dibayar'}</div>
                ${!inv.paid ? `<button class="btn btn-success btn-sm" onclick="markPaid('${inv.id}')">Tandai Lunas</button>` : ''}
            `;
            invoiceListDiv.appendChild(div);
        });
    }

    window.markPaid = (id) => {
        const idx = invoices.findIndex(i => i.id === id);
        if (idx !== -1) {
            invoices[idx].paid = true;
            saveInvoices();
            renderInvoices();
        }
    };

    invoiceForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('invoiceEmail').value.trim();
        const name = document.getElementById('invoiceName').value.trim();
        const amount = parseInt(document.getElementById('invoiceAmount').value);
        const desc = document.getElementById('invoiceDesc').value.trim();
        if (!email || !amount || !desc) return alert('Isi semua');
        invoices.push({ id: 'inv'+Date.now(), email, name, amount, desc, paid: false, createdAt: new Date().toISOString() });
        saveInvoices();
        renderInvoices();
        invoiceForm.reset();
    });

    function renderAds() {
        adListDiv.innerHTML = '';
        if (ads.length === 0) { adListDiv.innerHTML = '<div class="card">Belum ada iklan.</div>'; return; }
        ads.forEach(ad => {
            const card = document.createElement('div');
            card.className = 'ad-card';
            card.innerHTML = `
                <div class="ad-img">${ad.imageUrl ? `<img src="${ad.imageUrl}">` : '<i class="fas fa-image fa-3x"></i>'}</div>
                <div class="ad-info">
                    <div class="ad-title">${ad.title}</div>
                    <div class="ad-link">${ad.link}</div>
                    <div>Status: ${ad.active ? '<span class="badge-active">Aktif</span>' : '<span class="badge-inactive">Tidak Aktif</span>'}</div>
                    <div class="ad-actions">
                        <button class="btn btn-outline" onclick="editAd('${ad.id}')">Edit</button>
                        <button class="btn btn-outline" onclick="toggleAdActive('${ad.id}')">${ad.active ? 'Nonaktifkan' : 'Aktifkan'}</button>
                        <button class="btn btn-danger" onclick="deleteAd('${ad.id}')">Hapus</button>
                    </div>
                </div>
            `;
            adListDiv.appendChild(card);
        });
    }

    window.editAd = (id) => {
        const ad = ads.find(a => a.id === id);
        if (ad) {
            adTitleInput.value = ad.title;
            adLinkInput.value = ad.link;
            adActiveSelect.value = ad.active ? 'true' : 'false';
            if (ad.imageUrl) { adImagePreview.src = ad.imageUrl; adImagePreview.style.display = 'block'; }
            else adImagePreview.style.display = 'none';
            adImageFile.value = '';
            adForm.dataset.editId = ad.id;
        }
    };
    window.toggleAdActive = (id) => {
        const idx = ads.findIndex(a => a.id === id);
        if (idx !== -1) {
            ads[idx].active = !ads[idx].active;
            saveAds();
            renderAds();
        }
    };
    window.deleteAd = (id) => {
        if (confirm('Hapus iklan?')) {
            ads = ads.filter(a => a.id !== id);
            saveAds();
            renderAds();
        }
    };

    adForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = adTitleInput.value.trim();
        const link = adLinkInput.value.trim();
        const active = adActiveSelect.value === 'true';
        const file = adImageFile.files[0];
        if (!title || !link) return alert('Isi semua');
        const process = (img) => {
            const editId = adForm.dataset.editId;
            if (editId) {
                const idx = ads.findIndex(a => a.id === editId);
                if (idx !== -1) ads[idx] = { ...ads[idx], title, link, active, imageUrl: img || ads[idx].imageUrl };
                delete adForm.dataset.editId;
            } else {
                ads.push({ id: 'ad'+Date.now(), title, imageUrl: img || '', link, active, createdAt: new Date().toISOString() });
            }
            saveAds();
            renderAds();
            adForm.reset();
            adImagePreview.style.display = 'none';
        };
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => process(ev.target.result);
            reader.readAsDataURL(file);
        } else {
            process(null);
        }
    });

    function renderBanners() {
        bannerListDiv.innerHTML = '';
        if (banners.length === 0) { bannerListDiv.innerHTML = '<div class="card">Belum ada banner.</div>'; return; }
        banners.forEach(b => {
            const card = document.createElement('div');
            card.className = 'banner-card';
            card.innerHTML = `
                <div class="banner-img">${b.imageUrl ? `<img src="${b.imageUrl}">` : '<i class="fas fa-image fa-3x"></i>'}</div>
                <div class="banner-info">
                    <div class="banner-title">Link: ${b.link}</div>
                    <div>Status: ${b.active ? '<span class="badge-active">Aktif</span>' : '<span class="badge-inactive">Tidak Aktif</span>'}</div>
                    <div class="banner-actions">
                        <button class="btn btn-outline" onclick="toggleBannerActive('${b.id}')">${b.active ? 'Nonaktifkan' : 'Aktifkan'}</button>
                        <button class="btn btn-danger" onclick="deleteBanner('${b.id}')">Hapus</button>
                    </div>
                </div>
            `;
            bannerListDiv.appendChild(card);
        });
    }

    window.toggleBannerActive = (id) => {
        const idx = banners.findIndex(b => b.id === id);
        if (idx !== -1) {
            banners[idx].active = !banners[idx].active;
            saveBanners();
            renderBanners();
        }
    };
    window.deleteBanner = (id) => {
        if (confirm('Hapus banner ini?')) {
            banners = banners.filter(b => b.id !== id);
            saveBanners();
            renderBanners();
        }
    };

    bannerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const link = bannerLinkInput.value.trim();
        const active = bannerActiveSelect.value === 'true';
        const file = bannerImageFile.files[0];
        if (!link) return alert('Masukkan link');
        if (!file) return alert('Pilih gambar banner');
        const reader = new FileReader();
        reader.onload = (ev) => {
            banners.push({ id: 'b'+Date.now(), imageUrl: ev.target.result, link, active, createdAt: new Date().toISOString() });
            saveBanners();
            renderBanners();
            bannerForm.reset();
            bannerImagePreview.style.display = 'none';
        };
        reader.readAsDataURL(file);
    });

    // Login
    adminLoginBtn.addEventListener('click', () => {
        const password = document.getElementById('adminPassword').value.trim();
        if (password === 'admin1') {
            loginFormDiv.style.display = 'none';
            adminPanelDiv.style.display = 'block';
            showProducts();
        } else {
            alert('Password salah! Gunakan "admin1"');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }
    });

    // Tabs
    productsTab.addEventListener('click', showProducts);
    ordersTab.addEventListener('click', showOrders);
    invoicesTab.addEventListener('click', showInvoices);
    adsTab.addEventListener('click', showAds);
    bannersTab.addEventListener('click', showBanners);
    logoutBtn.addEventListener('click', () => {
        adminPanelDiv.style.display = 'none';
        loginFormDiv.style.display = 'block';
        document.getElementById('adminPassword').value = '';
    });

    // Initial render
    renderProducts();
    renderOrders();
    renderInvoices();
    renderAds();
    renderBanners();
</script>
</body>
</html>
