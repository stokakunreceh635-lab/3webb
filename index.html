<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 3DXO Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:linear-gradient(145deg,#f0f4f8 0%,#e6edf4 100%); color:#1a2c3e; padding:1.5rem; }
        .container { max-width:1400px; margin:0 auto; }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .logo-letter {
            width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            border-radius: 0.8rem;
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .logo-letter:nth-child(2) { background: #f59e0b; color: #1e293b; }
        .logo-letter:nth-child(3) { background: #3b82f6; }
        .logo-letter:nth-child(4) { background: #f59e0b; color: #1e293b; }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            margin-left: 0.5rem;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .navbar {
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(10px);
            border-radius:2rem;
            padding:1rem 2rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:2rem;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }
        .nav-links { display:flex; gap:1.5rem; }
        .nav-links a { text-decoration:none; color:#334155; font-weight:600; transition:0.2s; cursor:pointer; }
        .nav-links a:hover { color:#3b82f6; }
        .card { background:white; border-radius:2rem; padding:1.8rem; margin-bottom:2rem; box-shadow:0 10px 25px -5px rgba(0,0,0,0.05); transition:0.3s; }
        .section-title { font-size:1.8rem; font-weight:700; margin-bottom:1.5rem; color:#1e293b; }
        .form-group { margin-bottom:1.2rem; }
        .form-group label { display:block; font-weight:600; margin-bottom:0.4rem; color:#334155; }
        .form-control { width:100%; padding:0.8rem 1rem; border:2px solid #e2e8f0; border-radius:1rem; font-size:1rem; transition:0.2s; }
        .form-control:focus { outline:none; border-color:#3b82f6; }
        .btn { padding:0.7rem 1.5rem; border-radius:2rem; font-weight:600; cursor:pointer; transition:0.2s; border:none; }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-primary:hover { background:#2563eb; transform:translateY(-2px); }
        .btn-outline { background:white; border:2px solid #3b82f6; color:#3b82f6; }
        .btn-outline:hover { background:#3b82f6; color:white; }
        .btn-danger { background:#ef4444; color:white; }
        .btn-success { background:#10b981; color:white; }
        .product-grid, .ad-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.8rem; }
        .product-card, .ad-card { background:#f8fafc; border-radius:1.5rem; overflow:hidden; border:1px solid #e2e8f0; transition:0.2s; }
        .product-card:hover, .ad-card:hover { transform:translateY(-5px); box-shadow:0 15px 30px -12px rgba(0,0,0,0.15); }
        .product-img, .ad-img { height:180px; background:#cbd5e1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .product-img img, .ad-img img { width:100%; height:100%; object-fit:cover; }
        .product-info, .ad-info { padding:1.2rem; }
        .product-title { font-weight:700; font-size:1.2rem; }
        .product-price { color:#3b82f6; font-weight:800; margin:0.5rem 0; }
        .ad-title { font-weight:700; font-size:1.1rem; }
        .product-actions, .ad-actions { display:flex; gap:0.8rem; justify-content:flex-end; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:white; border-radius:2rem; padding:2rem; max-width:500px; width:90%; }
        .invoice-item { border:1px solid #e2e8f0; border-radius:1rem; padding:1rem; margin-bottom:1rem; }
        .badge-active { background:#10b981; color:white; padding:0.2rem 0.6rem; border-radius:1rem; font-size:0.8rem; }
        .badge-inactive { background:#ef4444; color:white; padding:0.2rem 0.6rem; border-radius:1rem; font-size:0.8rem; }
        footer { text-align:center; margin-top:3rem; color:#64748b; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">
            <div class="logo-letter">3</div>
            <div class="logo-letter">D</div>
            <div class="logo-letter">X</div>
            <div class="logo-letter">O</div>
            <div class="logo-text">STORE</div>
        </div>
        <div class="nav-links">
            <a id="productsTab">Produk</a>
            <a id="ordersTab">Pesanan</a>
            <a id="invoicesTab">Tagihan</a>
            <a id="adsTab">Iklan</a>
            <a id="logoutBtn">Logout</a>
        </div>
    </div>

    <div id="loginForm" class="card" style="max-width:400px; margin:2rem auto; text-align:center;">
        <h2 class="section-title">Admin Login</h2>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="adminPassword" class="form-control" placeholder="Masukkan password admin">
        </div>
        <button class="btn btn-primary" id="adminLoginBtn">Login</button>
        <p style="margin-top:1rem;">Password: <strong>admin1</strong></p>
    </div>

    <div id="adminPanel" style="display:none;">
        <!-- Produk -->
        <div id="productsPanel">
            <div class="card">
                <h2 class="section-title">Tambah / Edit Produk</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label>Nama Layanan</label>
                        <input type="text" id="productName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <input type="text" id="productCategory" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Harga (Rp)</label>
                        <input type="number" id="productPrice" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi</label>
                        <textarea id="productDesc" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>URL Gambar (opsional)</label>
                        <input type="url" id="productImage" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan Produk</button>
                    <button type="button" id="cancelEdit" class="btn btn-outline">Batal</button>
                </form>
            </div>
            <div class="card">
                <h2 class="section-title">Daftar Produk</h2>
                <div id="productList" class="product-grid"></div>
            </div>
        </div>

        <!-- Pesanan -->
        <div id="ordersPanel" style="display:none;">
            <div class="card">
                <h2 class="section-title">Pesanan Masuk</h2>
                <div id="orderList"></div>
            </div>
        </div>

        <!-- Tagihan -->
        <div id="invoicesPanel" style="display:none;">
            <div class="card">
                <h2 class="section-title">Buat Tagihan Baru</h2>
                <form id="invoiceForm">
                    <div class="form-group">
                        <label>Email Pembeli</label>
                        <input type="email" id="invoiceEmail" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Pembeli (opsional)</label>
                        <input type="text" id="invoiceName" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Nominal (Rp)</label>
                        <input type="number" id="invoiceAmount" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Tagihan</label>
                        <textarea id="invoiceDesc" class="form-control" rows="2" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Buat Tagihan</button>
                </form>
            </div>
            <div class="card">
                <h2 class="section-title">Daftar Tagihan</h2>
                <div id="invoiceList"></div>
            </div>
        </div>

        <!-- Iklan -->
        <div id="adsPanel" style="display:none;">
            <div class="card">
                <h2 class="section-title">Tambah Iklan Baru</h2>
                <form id="adForm">
                    <div class="form-group">
                        <label>Judul Iklan</label>
                        <input type="text" id="adTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>URL Gambar</label>
                        <input type="url" id="adImageUrl" class="form-control" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label>URL Tautan</label>
                        <input type="url" id="adLink" class="form-control" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="adActive" class="form-control">
                            <option value="true">Aktif</option>
                            <option value="false">Tidak Aktif</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan Iklan</button>
                </form>
            </div>
            <div class="card">
                <h2 class="section-title">Daftar Iklan</h2>
                <div id="adList" class="ad-grid"></div>
            </div>
        </div>
    </div>

    <footer>© 2026 3DXO STORE - Admin Panel</footer>
</div>

<script>
    const STORAGE_KEYS = {
        PRODUCTS: '3dxo_products',
        ORDERS: '3dxo_orders',
        INVOICES: '3dxo_invoices',
        ADS: '3dxo_ads'
    };
    let products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS)) || [];
    let orders = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS)) || [];
    let invoices = JSON.parse(localStorage.getItem(STORAGE_KEYS.INVOICES)) || [];
    let ads = JSON.parse(localStorage.getItem(STORAGE_KEYS.ADS)) || [];

    function saveProducts() { localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); }
    function saveOrders() { localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders)); }
    function saveInvoices() { localStorage.setItem(STORAGE_KEYS.INVOICES, JSON.stringify(invoices)); }
    function saveAds() { localStorage.setItem(STORAGE_KEYS.ADS, JSON.stringify(ads)); }

    if (products.length === 0) {
        products = [
            { id: 'p1', name: 'Website Company Profile', category: 'Website', price: 1500000, desc: 'Website profesional untuk perusahaan Anda.', image: 'https://picsum.photos/id/20/300/200' },
            { id: 'p2', name: 'Toko Online (E-commerce)', category: 'E-commerce', price: 3500000, desc: 'Toko online lengkap.', image: 'https://picsum.photos/id/30/300/200' },
            { id: 'p3', name: 'Landing Page Modern', category: 'Landing Page', price: 800000, desc: 'Halaman promosi menarik.', image: 'https://picsum.photos/id/40/300/200' }
        ];
        saveProducts();
    }
    if (ads.length === 0) {
        ads = [
            { id: 'ad1', title: 'Promo Spesial', imageUrl: 'https://picsum.photos/id/1/300/200', link: 'https://example.com', active: true, createdAt: new Date().toISOString() },
            { id: 'ad2', title: 'Diskon 50%', imageUrl: 'https://picsum.photos/id/2/300/200', link: 'https://example.com', active: true, createdAt: new Date().toISOString() }
        ];
        saveAds();
    }

    // DOM elements
    const loginFormDiv = document.getElementById('loginForm');
    const adminPanelDiv = document.getElementById('adminPanel');
    const productsPanelDiv = document.getElementById('productsPanel');
    const ordersPanelDiv = document.getElementById('ordersPanel');
    const invoicesPanelDiv = document.getElementById('invoicesPanel');
    const adsPanelDiv = document.getElementById('adsPanel');
    const productListDiv = document.getElementById('productList');
    const orderListDiv = document.getElementById('orderList');
    const invoiceListDiv = document.getElementById('invoiceList');
    const adListDiv = document.getElementById('adList');
    const productForm = document.getElementById('productForm');
    const invoiceForm = document.getElementById('invoiceForm');
    const adForm = document.getElementById('adForm');
    const productIdInput = document.getElementById('productId');
    const productNameInput = document.getElementById('productName');
    const productCategoryInput = document.getElementById('productCategory');
    const productPriceInput = document.getElementById('productPrice');
    const productDescInput = document.getElementById('productDesc');
    const productImageInput = document.getElementById('productImage');
    const cancelEditBtn = document.getElementById('cancelEdit');
    const productsTab = document.getElementById('productsTab');
    const ordersTab = document.getElementById('ordersTab');
    const invoicesTab = document.getElementById('invoicesTab');
    const adsTab = document.getElementById('adsTab');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminLoginBtn = document.getElementById('adminLoginBtn');

    // Function definitions
    function showProducts() { productsPanelDiv.style.display='block'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='none'; renderProducts(); }
    function showOrders() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='block'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='none'; renderOrders(); }
    function showInvoices() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='block'; adsPanelDiv.style.display='none'; renderInvoices(); }
    function showAds() { productsPanelDiv.style.display='none'; ordersPanelDiv.style.display='none'; invoicesPanelDiv.style.display='none'; adsPanelDiv.style.display='block'; renderAds(); }

    function renderProducts() {
        productListDiv.innerHTML = '';
        if (products.length === 0) { productListDiv.innerHTML = '<div class="card">Belum ada produk.</div>'; return; }
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img">${p.image ? `<img src="${p.image}">` : '<i class="fas fa-code fa-3x"></i>'}</div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                    <div class="product-desc">${p.desc.substring(0,80)}${p.desc.length>80?'...':''}</div>
                    <div class="product-actions">
                        <button class="btn btn-outline" onclick="editProduct('${p.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Hapus</button>
                    </div>
                </div>
            `;
            productListDiv.appendChild(card);
        });
    }

    window.editProduct = (id) => {
        const p = products.find(p => p.id === id);
        if (p) {
            productIdInput.value = p.id;
            productNameInput.value = p.name;
            productCategoryInput.value = p.category;
            productPriceInput.value = p.price;
            productDescInput.value = p.desc;
            productImageInput.value = p.image || '';
            productForm.scrollIntoView({ behavior: 'smooth' });
        }
    };
    window.deleteProduct = (id) => {
        if (confirm('Hapus produk?')) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProducts();
        }
    };

    productForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = productIdInput.value;
        const name = productNameInput.value.trim();
        const category = productCategoryInput.value.trim();
        const price = parseInt(productPriceInput.value);
        const desc = productDescInput.value.trim();
        const image = productImageInput.value.trim();
        if (!name || !category || !price || !desc) return alert('Isi semua');
        if (id) {
            const idx = products.findIndex(p => p.id === id);
            if (idx !== -1) products[idx] = { ...products[idx], name, category, price, desc, image };
        } else {
            products.push({ id: 'p'+Date.now(), name, category, price, desc, image });
        }
        saveProducts();
        renderProducts();
        productForm.reset();
        productIdInput.value = '';
    });
    cancelEditBtn.addEventListener('click', () => productForm.reset());

    function renderOrders() {
        orderListDiv.innerHTML = '';
        if (orders.length === 0) { orderListDiv.innerHTML = '<div class="card">Belum ada pesanan.</div>'; return; }
        orders.forEach(order => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div><strong>ID:</strong> ${order.id}</div>
                <div><strong>Pembeli:</strong> ${order.customerName} (${order.customerEmail})</div>
                <div><strong>Total:</strong> Rp ${order.total.toLocaleString()}</div>
                <div><strong>Status:</strong> ${order.status}</div>
                <div><strong>Tanggal:</strong> ${new Date(order.date).toLocaleString()}</div>
                <hr>
                <h4>Detail:</h4>
                ${order.items.map(i => `<div>${i.name} x ${i.quantity} = Rp ${(i.price*i.quantity).toLocaleString()}</div>`).join('')}
            `;
            orderListDiv.appendChild(card);
        });
    }

    function renderInvoices() {
        invoiceListDiv.innerHTML = '';
        if (invoices.length === 0) { invoiceListDiv.innerHTML = '<div class="card">Belum ada tagihan.</div>'; return; }
        invoices.forEach(inv => {
            const div = document.createElement('div');
            div.className = 'invoice-item';
            div.innerHTML = `
                <div><strong>${inv.email}</strong> - ${inv.name || '-'}</div>
                <div>Rp ${inv.amount.toLocaleString()} - ${inv.desc}</div>
                <div>Status: ${inv.paid ? 'Lunas' : 'Belum Dibayar'}</div>
                ${!inv.paid ? `<button class="btn btn-success btn-sm" onclick="markPaid('${inv.id}')">Tandai Lunas</button>` : ''}
            `;
            invoiceListDiv.appendChild(div);
        });
    }

    window.markPaid = (id) => {
        const idx = invoices.findIndex(i => i.id === id);
        if (idx !== -1) {
            invoices[idx].paid = true;
            saveInvoices();
            renderInvoices();
        }
    };

    invoiceForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('invoiceEmail').value.trim();
        const name = document.getElementById('invoiceName').value.trim();
        const amount = parseInt(document.getElementById('invoiceAmount').value);
        const desc = document.getElementById('invoiceDesc').value.trim();
        if (!email || !amount || !desc) return alert('Isi semua');
        invoices.push({ id: 'inv'+Date.now(), email, name, amount, desc, paid: false, createdAt: new Date().toISOString() });
        saveInvoices();
        renderInvoices();
        invoiceForm.reset();
    });

    function renderAds() {
        adListDiv.innerHTML = '';
        if (ads.length === 0) { adListDiv.innerHTML = '<div class="card">Belum ada iklan.</div>'; return; }
        ads.forEach(ad => {
            const card = document.createElement('div');
            card.className = 'ad-card';
            card.innerHTML = `
                <div class="ad-img"><img src="${ad.imageUrl}" alt="${ad.title}"></div>
                <div class="ad-info">
                    <div class="ad-title">${ad.title}</div>
                    <div class="ad-link">${ad.link}</div>
                    <div class="mt-2">Status: ${ad.active ? '<span class="badge-active">Aktif</span>' : '<span class="badge-inactive">Tidak Aktif</span>'}</div>
                    <div class="ad-actions">
                        <button class="btn btn-outline" onclick="editAd('${ad.id}')">Edit</button>
                        <button class="btn btn-outline" onclick="toggleAdActive('${ad.id}')">${ad.active ? 'Nonaktifkan' : 'Aktifkan'}</button>
                        <button class="btn btn-danger" onclick="deleteAd('${ad.id}')">Hapus</button>
                    </div>
                </div>
            `;
            adListDiv.appendChild(card);
        });
    }

    window.editAd = (id) => {
        const ad = ads.find(a => a.id === id);
        if (ad) {
            document.getElementById('adTitle').value = ad.title;
            document.getElementById('adImageUrl').value = ad.imageUrl;
            document.getElementById('adLink').value = ad.link;
            document.getElementById('adActive').value = ad.active ? 'true' : 'false';
            adForm.dataset.editId = ad.id;
        }
    };
    window.toggleAdActive = (id) => {
        const idx = ads.findIndex(a => a.id === id);
        if (idx !== -1) {
            ads[idx].active = !ads[idx].active;
            saveAds();
            renderAds();
        }
    };
    window.deleteAd = (id) => {
        if (confirm('Hapus iklan ini?')) {
            ads = ads.filter(a => a.id !== id);
            saveAds();
            renderAds();
        }
    };

    adForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('adTitle').value.trim();
        const imageUrl = document.getElementById('adImageUrl').value.trim();
        const link = document.getElementById('adLink').value.trim();
        const active = document.getElementById('adActive').value === 'true';
        if (!title || !imageUrl || !link) return alert('Isi semua field');
        const editId = adForm.dataset.editId;
        if (editId) {
            const idx = ads.findIndex(a => a.id === editId);
            if (idx !== -1) {
                ads[idx] = { ...ads[idx], title, imageUrl, link, active };
                delete adForm.dataset.editId;
            }
        } else {
            ads.push({ id: 'ad'+Date.now(), title, imageUrl, link, active, createdAt: new Date().toISOString() });
        }
        saveAds();
        renderAds();
        adForm.reset();
    });

    // LOGIN - password sekarang admin1
    adminLoginBtn.addEventListener('click', () => {
        const password = document.getElementById('adminPassword').value.trim();
        if (password === 'admin1') {
            loginFormDiv.style.display = 'none';
            adminPanelDiv.style.display = 'block';
            showProducts();
        } else {
            alert('Password salah! Gunakan "admin1"');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }
    });

    // Tabs
    productsTab.addEventListener('click', showProducts);
    ordersTab.addEventListener('click', showOrders);
    invoicesTab.addEventListener('click', showInvoices);
    adsTab.addEventListener('click', showAds);
    logoutBtn.addEventListener('click', () => {
        adminPanelDiv.style.display = 'none';
        loginFormDiv.style.display = 'block';
        document.getElementById('adminPassword').value = '';
    });

    // Initial render (these will run but panel hidden)
    renderProducts();
    renderOrders();
    renderInvoices();
    renderAds();
</script>
</body>
</html>
